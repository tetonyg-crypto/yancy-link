<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Dashboard | Yancy Garcia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141416;
            --surface-2: #1c1c1f;
            --border: #2a2a2e;
            --text: #f0f0f2;
            --text-muted: #8a8a95;
            --accent: #3b82f6;
            --green: #22c55e;
            --orange: #f97316;
            --purple: #8b5cf6;
            --red: #ef4444;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .login { max-width: 360px; margin: 120px auto; text-align: center; }
        .login h1 { font-size: 20px; margin-bottom: 20px; }
        .login input {
            width: 100%; padding: 14px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: inherit; font-size: 14px;
            outline: none; margin-bottom: 12px;
        }
        .login input:focus { border-color: var(--accent); }
        .login button {
            width: 100%; padding: 14px; background: var(--accent);
            border: none; border-radius: 10px; color: white;
            font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .login .error { color: var(--red); font-size: 13px; margin-top: 8px; }
        .dash { display: none; max-width: 900px; margin: 0 auto; }
        .dash.active { display: block; }
        .dash h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; text-align: center;
        }
        .stat-card .num { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
        .stat-card.fb .num { color: var(--accent); }
        .stat-card.tt .num { color: var(--purple); }
        .stat-card.ref .num { color: var(--green); }
        .stat-card.direct .num { color: var(--orange); }
        .bar-row { display: flex; gap: 4px; height: 32px; margin-bottom: 24px; border-radius: 8px; overflow: hidden; }
        .bar-seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; min-width: 30px; }
        .bar-fb { background: var(--accent); }
        .bar-tt { background: var(--purple); }
        .bar-ref { background: var(--green); }
        .bar-direct { background: var(--orange); }
        .section-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 10px; }
        .lead-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
        .lead-table th {
            text-align: left; padding: 10px 12px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .lead-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .lead-table tr:hover td { background: var(--surface); }
        .src-badge {
            display: inline-block; padding: 2px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .src-fb { background: rgba(59,130,246,0.15); color: var(--accent); }
        .src-tt { background: rgba(139,92,246,0.15); color: var(--purple); }
        .src-ref { background: rgba(34,197,94,0.12); color: var(--green); }
        .src-direct { background: rgba(249,115,22,0.12); color: var(--orange); }
        .contacted-btn {
            width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
            background: transparent; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 14px; color: transparent;
        }
        .contacted-btn.done { border-color: var(--green); background: rgba(34,197,94,0.15); color: var(--green); }
        .text-link { color: var(--accent); text-decoration: none; font-size: 13px; }
        .text-link:hover { text-decoration: underline; }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        @media (max-width: 600px) {
            .lead-table th:nth-child(4), .lead-table td:nth-child(4),
            .lead-table th:nth-child(5), .lead-table td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
    <div class="login" id="loginPanel">
        <h1>Lead Dashboard</h1>
        <input type="password" id="passInput" placeholder="Password" autofocus>
        <button onclick="doLogin()">Enter</button>
        <div class="error" id="loginError"></div>
    </div>

    <div class="dash" id="dashPanel">
        <h1>Lead Dashboard</h1>
        <div class="stats-row" id="statsRow"></div>
        <div class="bar-row" id="barChart"></div>
        <div class="section-lbl">All Leads</div>
        <table class="lead-table">
            <thead>
                <tr>
                    <th>✓</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Need</th>
                    <th>Source</th>
                    <th>Time</th>
                    <th>Text</th>
                </tr>
            </thead>
            <tbody id="leadBody"></tbody>
        </table>
        <div class="empty" id="emptyMsg" style="display:none">No leads yet. Share your /deal link!</div>
    </div>

    <script>
    let PASSWORD = '';

    document.getElementById('passInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
        PASSWORD = document.getElementById('passInput').value;
        try {
            const res = await fetch('/api/leads?password=' + encodeURIComponent(PASSWORD));
            if (res.status === 401) {
                document.getElementById('loginError').textContent = 'Wrong password';
                return;
            }
            const leads = await res.json();
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashPanel').classList.add('active');
            renderDashboard(leads);
        } catch (e) {
            document.getElementById('loginError').textContent = 'Connection error';
        }
    }

    function renderDashboard(leads) {
        // Stats
        const now = new Date();
        const thisMonth = leads.filter(l => new Date(l.timestamp).getMonth() === now.getMonth() && new Date(l.timestamp).getFullYear() === now.getFullYear());
        const bySrc = { fb: 0, tt: 0, ref: 0, direct: 0 };
        thisMonth.forEach(l => {
            const s = l.source || 'direct';
            if (s === 'fb') bySrc.fb++;
            else if (s === 'tt') bySrc.tt++;
            else if (s === 'ref') bySrc.ref++;
            else bySrc.direct++;
        });

        const statsRow = document.getElementById('statsRow');
        statsRow.innerHTML = [
            { n: thisMonth.length, l: 'This Month', c: '' },
            { n: bySrc.fb, l: 'Facebook', c: 'fb' },
            { n: bySrc.tt, l: 'TikTok', c: 'tt' },
            { n: bySrc.ref, l: 'Referral', c: 'ref' },
            { n: bySrc.direct, l: 'Direct', c: 'direct' }
        ].map(s => '<div class="stat-card ' + s.c + '"><div class="num">' + s.n + '</div><div class="lbl">' + s.l + '</div></div>').join('');

        // Bar chart
        const total = thisMonth.length || 1;
        const bar = document.getElementById('barChart');
        if (thisMonth.length > 0) {
            bar.innerHTML = [
                bySrc.fb > 0 ? '<div class="bar-seg bar-fb" style="flex:' + bySrc.fb + '">' + bySrc.fb + ' FB</div>' : '',
                bySrc.tt > 0 ? '<div class="bar-seg bar-tt" style="flex:' + bySrc.tt + '">' + bySrc.tt + ' TT</div>' : '',
                bySrc.ref > 0 ? '<div class="bar-seg bar-ref" style="flex:' + bySrc.ref + '">' + bySrc.ref + ' Ref</div>' : '',
                bySrc.direct > 0 ? '<div class="bar-seg bar-direct" style="flex:' + bySrc.direct + '">' + bySrc.direct + ' Dir</div>' : ''
            ].join('');
        } else {
            bar.style.display = 'none';
        }

        // Table
        const tbody = document.getElementById('leadBody');
        if (leads.length === 0) {
            document.getElementById('emptyMsg').style.display = 'block';
            return;
        }
        tbody.innerHTML = leads.map(function(l) {
            const srcClass = 'src-' + (l.source === 'fb' || l.source === 'tt' || l.source === 'ref' ? l.source : 'direct');
            const time = new Date(l.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + new Date(l.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const smsBody = encodeURIComponent("Hey " + l.name + ", it's Yancy from Teton Motors! I saw you were interested in " + (l.need || 'a vehicle') + ". What's your budget range?");
            return '<tr>' +
                '<td><button class="contacted-btn ' + (l.contacted ? 'done' : '') + '" onclick="toggleContacted(\'' + l.id + '\', this)">' + (l.contacted ? '✓' : '') + '</button></td>' +
                '<td><strong>' + l.name + '</strong></td>' +
                '<td>' + l.phone + '</td>' +
                '<td>' + (l.need || '-') + '</td>' +
                '<td><span class="src-badge ' + srcClass + '">' + (l.source || 'direct') + '</span></td>' +
                '<td>' + time + '</td>' +
                '<td><a class="text-link" href="sms:' + l.phone + '?body=' + smsBody + '">Text →</a></td>' +
                '</tr>';
        }).join('');
    }

    async function toggleContacted(id, btn) {
        const isDone = btn.classList.contains('done');
        btn.classList.toggle('done');
        btn.textContent = isDone ? '' : '✓';
        await fetch('/api/leads', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Dashboard-Password': PASSWORD },
            body: JSON.stringify({ id: id, contacted: !isDone })
        });
    }
    </script>
</body>
</html>
