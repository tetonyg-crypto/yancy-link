<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YENES OS v1.0 | System Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000008;
    color: #00f2ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #graph-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

  /* Scanline overlay */
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 180, 255, 0.015) 2px, rgba(0, 180, 255, 0.015) 4px
    );
    animation: scanScroll 8s linear infinite;
  }
  @keyframes scanScroll { from { background-position-y: 0; } to { background-position-y: 100px; } }

  /* HUD Top Left */
  #hud-tl {
    position: fixed; top: 24px; left: 28px; z-index: 10;
    pointer-events: none;
  }
  #hud-tl .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(0,242,255,0.6), 0 0 40px rgba(0,242,255,0.3);
  }
  #hud-tl .status {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px; font-size: 13px; letter-spacing: 2px;
    color: rgba(0, 242, 255, 0.7);
  }
  #hud-tl .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #hud-tl .time { margin-top: 4px; font-size: 12px; color: rgba(0,200,255,0.5); letter-spacing: 3px; }

  /* HUD Top Right */
  #hud-tr {
    position: fixed; top: 24px; right: 28px; z-index: 10;
    text-align: right; pointer-events: none;
    font-size: 12px; letter-spacing: 2px;
    color: rgba(0, 242, 255, 0.6);
  }
  #hud-tr .val { color: #00f2ff; font-weight: 600; font-size: 14px; }

  /* HUD Bottom Center — Voice */
  #hud-voice {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; text-align: center;
    font-size: 12px; letter-spacing: 2px;
    color: rgba(0, 242, 255, 0.4);
    pointer-events: none;
  }
  #hud-voice .mic { font-size: 18px; margin-bottom: 4px; }
  #voice-cmd {
    color: #00ff88; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s;
    text-transform: uppercase; letter-spacing: 3px;
  }
  #voice-cmd.show { opacity: 1; }

  /* HUD Bottom Right — Legend */
  #hud-legend {
    position: fixed; bottom: 28px; right: 28px; z-index: 10;
    pointer-events: none; font-size: 11px; letter-spacing: 1px;
    color: rgba(0, 200, 255, 0.5);
  }
  #hud-legend .item { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  #hud-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* Sidebar */
  #sidebar {
    position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
    z-index: 20; padding: 40px 28px;
    background: rgba(0, 12, 40, 0.88);
    border-left: 1px solid rgba(0, 200, 255, 0.25);
    backdrop-filter: blur(16px);
    transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    overflow-y: auto;
  }
  #sidebar.open { right: 0; }
  #sidebar .close-btn {
    position: absolute; top: 16px; right: 20px;
    background: none; border: 1px solid rgba(0,200,255,0.3);
    color: #00f2ff; font-size: 18px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 4px;
    font-family: 'Rajdhani'; transition: all 0.2s;
  }
  #sidebar .close-btn:hover { background: rgba(0,200,255,0.15); }
  #sidebar .node-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px; font-weight: 700;
    letter-spacing: 4px; margin-bottom: 8px;
    text-shadow: 0 0 15px rgba(0,242,255,0.5);
  }
  #sidebar .node-group {
    display: inline-block; padding: 3px 12px;
    border: 1px solid rgba(0,200,255,0.4);
    border-radius: 3px; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(0,242,255,0.7); margin-bottom: 20px;
  }
  #sidebar .node-desc {
    font-size: 15px; line-height: 1.6;
    color: rgba(200, 230, 255, 0.8);
    margin-bottom: 28px; border-left: 2px solid rgba(0,200,255,0.3);
    padding-left: 16px;
  }
  #sidebar .connections-title {
    font-size: 12px; letter-spacing: 3px;
    color: rgba(0,200,255,0.5); margin-bottom: 10px;
  }
  #sidebar .conn-list { list-style: none; }
  #sidebar .conn-list li {
    padding: 6px 0; border-bottom: 1px solid rgba(0,200,255,0.08);
    font-size: 13px; letter-spacing: 1px; cursor: pointer;
    color: rgba(0,242,255,0.6); transition: color 0.2s;
  }
  #sidebar .conn-list li:hover { color: #00f2ff; }
  #sidebar .action-btn {
    margin-top: 28px; width: 100%;
    padding: 12px; border: 1px solid rgba(0,200,255,0.4);
    background: rgba(0,100,255,0.1); color: #00f2ff;
    font-family: 'Orbitron'; font-size: 12px;
    letter-spacing: 4px; cursor: pointer;
    border-radius: 4px; transition: all 0.3s;
    text-transform: uppercase;
  }
  #sidebar .action-btn:hover {
    background: rgba(0,100,255,0.25);
    box-shadow: 0 0 20px rgba(0,150,255,0.2);
  }

  /* Intro animation */
  #intro-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000008; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: opacity 1.5s ease;
  }
  #intro-overlay.fade { opacity: 0; pointer-events: none; }
  #intro-overlay .intro-text {
    font-family: 'Orbitron'; font-size: 36px; font-weight: 900;
    letter-spacing: 12px; opacity: 0;
    text-shadow: 0 0 30px rgba(0,242,255,0.8);
    animation: introFade 2s ease forwards;
  }
  #intro-overlay .intro-sub {
    font-size: 14px; letter-spacing: 6px; opacity: 0;
    color: rgba(0,242,255,0.5);
    animation: introFade 2s ease 0.5s forwards;
  }
  @keyframes introFade { to { opacity: 1; } }
</style>
</head>
<body>

<!-- Intro -->
<div id="intro-overlay">
  <div class="intro-text">YENES OS</div>
  <div class="intro-sub">INITIALIZING SYSTEM MAP</div>
</div>

<!-- Scanlines -->
<div id="scanlines"></div>

<!-- HUD Top Left -->
<div id="hud-tl">
  <div class="title">YENES OS v1.0</div>
  <div class="status"><span class="dot"></span> SYSTEMS ONLINE</div>
  <div class="time" id="hud-time"></div>
</div>

<!-- HUD Top Right -->
<div id="hud-tr">
  <div>NODES: <span class="val" id="hud-nodes">0</span></div>
  <div>CONNECTIONS: <span class="val" id="hud-links">0</span></div>
  <div>STATUS: <span class="val" style="color:#00ff88">OPERATIONAL</span></div>
</div>

<!-- HUD Bottom Center -->
<div id="hud-voice">
  <div class="mic">🎙</div>
  <div>VOICE ACTIVE</div>
  <div id="voice-cmd"></div>
</div>

<!-- HUD Bottom Right Legend -->
<div id="hud-legend">
  <div class="item"><span class="swatch" style="background:#00f2ff"></span> COMPANY</div>
  <div class="item"><span class="swatch" style="background:#0099ff"></span> PRODUCT</div>
  <div class="item"><span class="swatch" style="background:#00ccff"></span> ENGINE</div>
  <div class="item"><span class="swatch" style="background:#33ddff"></span> TOOL</div>
  <div class="item"><span class="swatch" style="background:#00aaff"></span> INFRASTRUCTURE</div>
  <div class="item"><span class="swatch" style="background:#0088ff"></span> DISTRIBUTION</div>
  <div class="item"><span class="swatch" style="background:#3399ff"></span> CLIENT</div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">×</button>
  <div class="node-label" id="sb-label"></div>
  <div class="node-group" id="sb-group"></div>
  <div class="node-desc" id="sb-desc"></div>
  <div class="connections-title">CONNECTED TO</div>
  <ul class="conn-list" id="sb-connections"></ul>
  <button class="action-btn" id="sb-action"></button>
</div>

<!-- Graph -->
<div id="graph-container"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

<script>
const graphData = {
  "nodes": [
    {"id":"yenes","label":"YENES","group":"company","level":0,"description":"Parent tech venture. Owns Oper8er. AI infrastructure company.","color":"#00f2ff","val":40},
    {"id":"oper8er","label":"OPER8ER","group":"product","level":1,"description":"AI Sales Execution Infrastructure for car dealerships. $1,500/mo per location.","color":"#0099ff","val":30,"parent":"yenes"},
    {"id":"trident","label":"TRIDENT","group":"engine","level":2,"description":"Three-touch outreach weapon. SMS + RVM + Email fires simultaneously with Telegram approval gate.","color":"#00ccff","val":20,"parent":"oper8er"},
    {"id":"sms","label":"SMS RELAY","group":"tool","level":3,"description":"BlueBubbles MacBook relay. Sends from real iPhone 307-699-3743. Flask + ngrok.","color":"#33ddff","val":12,"parent":"trident"},
    {"id":"rvm","label":"RVM","group":"tool","level":3,"description":"Drop Cowboy ringless voicemail. AI voice clone or pre-recorded audio drop.","color":"#33ddff","val":12,"parent":"trident"},
    {"id":"email","label":"EMAIL","group":"tool","level":3,"description":"SendGrid from yancygarcia@stonescars.com. Auto-syncs to VinSolutions CRM.","color":"#33ddff","val":12,"parent":"trident"},
    {"id":"forge","label":"FORGE","group":"engine","level":2,"description":"Telegram AI copilot. Natural language + voice memo. 24/7 via PM2 on PC.","color":"#00ccff","val":20,"parent":"oper8er"},
    {"id":"dealer_operator","label":"DEALER OPERATOR","group":"engine","level":2,"description":"808 pages of automotive sales AI. Generates texts, emails, CRM notes. The core IP.","color":"#00ccff","val":22,"parent":"oper8er"},
    {"id":"crm_note","label":"CRM NOTE","group":"tool","level":3,"description":"Voice dictation to formatted VinSolutions note. EN + ES. Under 10 seconds.","color":"#33ddff","val":12,"parent":"dealer_operator"},
    {"id":"dashboard","label":"MANAGER DASHBOARD","group":"engine","level":2,"description":"Monday Deal Protection Report. Response times, ghost leads, rep adoption.","color":"#00ccff","val":18,"parent":"oper8er"},
    {"id":"chrome_ext","label":"CHROME EXTENSION","group":"engine","level":2,"description":"VinSolutions side panel. Auto-scrapes customer data. One-click generate.","color":"#00ccff","val":18,"parent":"oper8er"},
    {"id":"stones","label":"STONES AUTO","group":"client","level":1,"description":"Live beta. Chevrolet + Subaru + Toyota. Jackson WY. 6 locations.","color":"#3399ff","val":25,"parent":"yenes"},
    {"id":"google_drive","label":"GOOGLE DRIVE","group":"tool","level":2,"description":"Stones Jackson Inventory photos. Victor uploads. Supabase CDN sync.","color":"#33ddff","val":12,"parent":"stones"},
    {"id":"fb_extension","label":"FB MARKETPLACE","group":"tool","level":2,"description":"Chrome extension. One-click fills every field. 79 vehicles queued.","color":"#33ddff","val":12,"parent":"stones"},
    {"id":"supabase","label":"SUPABASE","group":"infrastructure","level":1,"description":"8 live tables. 1,419 photos uploaded. lead_pipeline, trident_log, crm_notes.","color":"#00aaff","val":28,"parent":"yenes"},
    {"id":"telegram","label":"TELEGRAM","group":"infrastructure","level":1,"description":"Command center. Lead alerts. Trident approval gate. FORGE interface.","color":"#00aaff","val":22,"parent":"yenes"},
    {"id":"yancygarcia","label":"YANCYGARCIA.COM","group":"distribution","level":1,"description":"5 funnel pages. GA4 + Meta Pixel. Lead capture. Cal.com booking.","color":"#0088ff","val":22,"parent":"yenes"},
    {"id":"inventory_site","label":"INVENTORY PORTAL","group":"distribution","level":2,"description":"79 vehicles live. Search, filters, payment calculator. 1,419 CDN photos.","color":"#33ddff","val":14,"parent":"yancygarcia"},
    {"id":"aida","label":"AIDA","group":"engine","level":2,"description":"Voice assistant on website. Text + hold-to-talk. Claude-powered.","color":"#00ccff","val":16,"parent":"yancygarcia"},
    {"id":"pipeline","label":"PIPELINE ENGINE","group":"engine","level":2,"description":"Inventory stalker. 72hr sequence. Post-sale lifecycle. Competitor intel.","color":"#00ccff","val":18,"parent":"oper8er"},
    {"id":"pc","label":"HOME PC","group":"infrastructure","level":1,"description":"Always-on Windows. PM2 runs FORGE. Scheduled tasks. Build machine.","color":"#0077dd","val":20,"parent":"yenes"},
    {"id":"macbook","label":"MACBOOK","group":"infrastructure","level":1,"description":"Mobile work surface. SMS relay. Claude Code. Chrome extension host.","color":"#0077dd","val":18,"parent":"yenes"},
    {"id":"mac_mini","label":"MAC MINI M4","group":"infrastructure","level":1,"description":"On order. Permanent always-on execution server. Replaces PC.","color":"#004488","val":16,"parent":"yenes"}
  ],
  "links": [
    {"source":"yenes","target":"oper8er"},{"source":"yenes","target":"stones"},
    {"source":"yenes","target":"supabase"},{"source":"yenes","target":"telegram"},
    {"source":"yenes","target":"yancygarcia"},{"source":"yenes","target":"pc"},
    {"source":"yenes","target":"macbook"},{"source":"yenes","target":"mac_mini"},
    {"source":"oper8er","target":"trident"},{"source":"oper8er","target":"forge"},
    {"source":"oper8er","target":"dealer_operator"},{"source":"oper8er","target":"dashboard"},
    {"source":"oper8er","target":"chrome_ext"},{"source":"oper8er","target":"pipeline"},
    {"source":"trident","target":"sms"},{"source":"trident","target":"rvm"},
    {"source":"trident","target":"email"},{"source":"dealer_operator","target":"crm_note"},
    {"source":"stones","target":"google_drive"},{"source":"stones","target":"fb_extension"},
    {"source":"yancygarcia","target":"inventory_site"},{"source":"yancygarcia","target":"aida"},
    {"source":"trident","target":"supabase"},{"source":"forge","target":"supabase"},
    {"source":"forge","target":"telegram"},{"source":"trident","target":"telegram"},
    {"source":"pipeline","target":"supabase"},{"source":"pipeline","target":"telegram"},
    {"source":"google_drive","target":"supabase"},{"source":"inventory_site","target":"supabase"},
    {"source":"forge","target":"pc"},{"source":"sms","target":"macbook"},
    {"source":"chrome_ext","target":"macbook"},{"source":"dealer_operator","target":"forge"},
    {"source":"crm_note","target":"forge"}
  ]
};

// State
let selectedNode = null;
let autoRotate = true;
let graph;

// HUD clock
function updateClock() {
  const now = new Date();
  document.getElementById('hud-time').textContent =
    now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' | ' + now.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// Stats
document.getElementById('hud-nodes').textContent = graphData.nodes.length;
document.getElementById('hud-links').textContent = graphData.links.length;

// Build graph
window.addEventListener('DOMContentLoaded', () => {
  // Intro sequence
  setTimeout(() => {
    document.getElementById('intro-overlay').classList.add('fade');
    setTimeout(() => document.getElementById('intro-overlay').remove(), 1500);
  }, 2500);

  const container = document.getElementById('graph-container');

  graph = ForceGraph3D()(container)
    .graphData(graphData)
    .backgroundColor('#000008')
    .nodeLabel(n => '')
    .nodeVal(n => n.val)
    .nodeColor(n => n.color)
    .nodeOpacity(0.92)
    .nodeResolution(24)
    .linkColor(() => 'rgba(0, 200, 255, 0.18)')
    .linkWidth(0.8)
    .linkOpacity(0.4)
    .linkDirectionalParticles(2)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleColor(() => '#00ccff')
    .linkDirectionalParticleSpeed(0.006)
    .linkDirectionalArrowLength(3)
    .linkDirectionalArrowColor(() => 'rgba(0, 200, 255, 0.3)')
    .d3AlphaDecay(0.02)
    .d3VelocityDecay(0.3)
    .warmupTicks(80)
    .cooldownTicks(100)
    .onNodeClick(node => {
      selectedNode = node;
      openSidebar(node);
      flyToNode(node);
    })
    .onBackgroundClick(() => {
      closeSidebar();
      selectedNode = null;
      resetCamera();
    })
    .nodeThreeObject(node => {
      const group = new THREE.Group();

      // Sphere
      const geometry = new THREE.SphereGeometry(Math.cbrt(node.val) * 1.5, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color: node.color,
        emissive: node.color,
        emissiveIntensity: 0.6,
        roughness: 0.3,
        metalness: 0.7,
        transparent: true,
        opacity: 0.88
      });
      const sphere = new THREE.Mesh(geometry, material);
      group.add(sphere);

      // Glow ring for root node
      if (node.id === 'yenes') {
        const ringGeo = new THREE.RingGeometry(8, 8.5, 64);
        const ringMat = new THREE.MeshBasicMaterial({
          color: '#00f2ff', transparent: true, opacity: 0.3, side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        group.add(ring);

        const ring2Geo = new THREE.RingGeometry(11, 11.4, 64);
        const ring2Mat = new THREE.MeshBasicMaterial({
          color: '#00f2ff', transparent: true, opacity: 0.15, side: THREE.DoubleSide
        });
        const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
        ring2.rotation.x = Math.PI / 2;
        group.add(ring2);
      }

      // Label
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 64;
      ctx.fillStyle = 'transparent';
      ctx.fillRect(0, 0, 256, 64);
      ctx.font = 'bold 22px Rajdhani, sans-serif';
      ctx.fillStyle = node.color;
      ctx.textAlign = 'center';
      ctx.shadowColor = node.color;
      ctx.shadowBlur = 12;
      ctx.fillText(node.label, 128, 40);

      const texture = new THREE.CanvasTexture(canvas);
      const labelMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9 });
      const label = new THREE.Sprite(labelMat);
      label.scale.set(20, 5, 1);
      label.position.set(0, Math.cbrt(node.val) * 1.5 + 4, 0);
      group.add(label);

      return group;
    });

  // Post-processing bloom
  const renderer = graph.renderer();
  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.5;

  const scene = graph.scene();
  const camera = graph.camera();

  const composer = new THREE.EffectComposer(renderer);
  const renderPass = new THREE.RenderPass(scene, camera);
  composer.addPass(renderPass);

  const bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.4, 0.7, 0.12
  );
  composer.addPass(bloomPass);

  graph.postProcessingComposer = composer;

  // Override render loop to use bloom
  const origRender = graph._animationCycle;
  graph.onAfterRender = () => {
    composer.render();
  };

  // Auto-rotate
  const controls = graph.controls();
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;

  // Pulsing root rings animation
  function animateRings() {
    const yenesNode = graphData.nodes.find(n => n.id === 'yenes');
    if (yenesNode && yenesNode.__threeObj) {
      const rings = yenesNode.__threeObj.children.filter(c => c.geometry && c.geometry.type === 'RingGeometry');
      const t = Date.now() * 0.001;
      rings.forEach((ring, i) => {
        ring.material.opacity = 0.15 + Math.sin(t * 1.5 + i) * 0.1;
        ring.rotation.z += 0.002 * (i + 1);
      });
    }
    requestAnimationFrame(animateRings);
  }
  animateRings();

  // Node hover glow
  graph.onNodeHover(node => {
    container.style.cursor = node ? 'pointer' : 'default';
    if (node && node.__threeObj) {
      const sphere = node.__threeObj.children[0];
      if (sphere && sphere.material) {
        sphere.material.emissiveIntensity = 1.2;
      }
    }
    // Reset others
    graphData.nodes.forEach(n => {
      if (n !== node && n.__threeObj && n.__threeObj.children[0]) {
        const s = n.__threeObj.children[0];
        if (s.material) s.material.emissiveIntensity = 0.6;
      }
    });
  });

  // Initial camera position
  setTimeout(() => {
    graph.cameraPosition({ x: 200, y: 120, z: 200 }, { x: 0, y: 0, z: 0 }, 3000);
  }, 500);
});

// Camera functions
function flyToNode(node) {
  const controls = graph.controls();
  controls.autoRotate = false;
  const dist = 60;
  const pos = node;
  graph.cameraPosition(
    { x: pos.x + dist, y: pos.y + dist * 0.5, z: pos.z + dist },
    { x: pos.x, y: pos.y, z: pos.z },
    1200
  );
}

function resetCamera() {
  const controls = graph.controls();
  if (autoRotate) controls.autoRotate = true;
  graph.cameraPosition(
    { x: 200, y: 120, z: 200 },
    { x: 0, y: 0, z: 0 },
    1200
  );
}

// Sidebar functions
function openSidebar(node) {
  document.getElementById('sb-label').textContent = node.label;
  document.getElementById('sb-group').textContent = node.group.toUpperCase();
  document.getElementById('sb-desc').textContent = node.description;

  // Connections
  const connList = document.getElementById('sb-connections');
  connList.innerHTML = '';
  const connected = graphData.links
    .filter(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === node.id || t === node.id;
    })
    .map(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === node.id ? t : s;
    });

  const uniqueConns = [...new Set(connected)];
  uniqueConns.forEach(cId => {
    const cNode = graphData.nodes.find(n => n.id === cId);
    if (cNode) {
      const li = document.createElement('li');
      li.textContent = cNode.label;
      li.onclick = () => {
        selectedNode = cNode;
        openSidebar(cNode);
        flyToNode(cNode);
      };
      connList.appendChild(li);
    }
  });

  // Action button
  const btn = document.getElementById('sb-action');
  const actions = {
    engine: 'VIEW SYSTEM', tool: 'CHECK STATUS', client: 'OPEN PORTAL',
    company: 'VIEW OVERVIEW', product: 'VIEW PRODUCT', infrastructure: 'VIEW LOGS',
    distribution: 'OPEN SITE'
  };
  btn.textContent = actions[node.group] || 'INSPECT';

  document.getElementById('sidebar').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// Voice commands
try {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = (event) => {
      const last = event.results[event.results.length - 1];
      const cmd = last[0].transcript.trim().toLowerCase();

      const vcEl = document.getElementById('voice-cmd');
      vcEl.textContent = 'COMMAND: ' + cmd.toUpperCase();
      vcEl.classList.add('show');
      setTimeout(() => vcEl.classList.remove('show'), 2000);

      if (cmd.includes('zoom out') || cmd.includes('pull back')) {
        closeSidebar();
        resetCamera();
      } else if (cmd.includes('rotate')) {
        autoRotate = !autoRotate;
        graph.controls().autoRotate = autoRotate;
      } else {
        // Try to match a node name
        const match = graphData.nodes.find(n =>
          cmd.includes(n.label.toLowerCase()) || cmd.includes(n.id.toLowerCase())
        );
        if (match) {
          selectedNode = match;
          openSidebar(match);
          flyToNode(match);
        }
      }
    };

    recognition.onend = () => recognition.start();
    recognition.start();
  }
} catch (e) {
  document.getElementById('hud-voice').innerHTML = '<div style="color:rgba(0,200,255,0.3)">VOICE: UNAVAILABLE</div>';
}
</script>
</body>
</html>
